name: Auto Unassign Inactive Issues

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger from Actions tab

jobs:
  unassign-inactive:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Auto Unassign Inactive Issues
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const DAYS_LIMIT = 7;
            const msLimit = DAYS_LIMIT * 24 * 60 * 60 * 1000;
            const now = new Date();

            // Fetch all open issues that have assignees
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              assignee: '*',
              per_page: 100
            });

            console.log(`Checking ${issues.length} open assigned issues...`);

            for (const issue of issues) {
              // Skip PRs (GitHub issues endpoint returns PRs as well)
              if (issue.pull_request) continue;

              const assignees = issue.assignees || [];
              if (assignees.length === 0) continue;

              try {
                // Fetch the timeline/events of the issue to find when the assignee was assigned
                const { data: events } = await github.rest.issues.listEvents({
                  owner,
                  repo,
                  issue_number: issue.number,
                  per_page: 100
                });

                // Filter for "assigned" events
                const assignedEvents = events.filter(e => e.event === 'assigned');

                for (const assignee of assignees) {
                  const username = assignee.login;
                  
                  // Find the latest assignment event for this user
                  const userAssignEvent = assignedEvents
                    .filter(e => e.assignee && e.assignee.login === username)
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

                  if (userAssignEvent) {
                    const assignDate = new Date(userAssignEvent.created_at);
                    const elapsedMs = now - assignDate;

                    console.log(`Issue #${issue.number}: @${username} was assigned on ${assignDate.toISOString()} (${Math.floor(elapsedMs / (1000 * 60 * 60 * 24))} days ago)`);

                    if (elapsedMs > msLimit) {
                      console.log(`Unassigning @${username} from Issue #${issue.number} due to inactivity...`);
                      
                      // Remove the assignee
                      await github.rest.issues.removeAssignees({
                        owner,
                        repo,
                        issue_number: issue.number,
                        assignees: [username]
                      });

                      // Post a comment explaining the unassignment
                      const commentBody = `Hi @${username}, it has been ${DAYS_LIMIT} days since you were assigned to this issue. In order to keep the project moving and allow other contributors a chance to work on it, you have been automatically unassigned.\n\nIf you are still interested in working on this issue, please feel free to comment here to ask to be re-assigned once you are ready!`;
                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: issue.number,
                        body: commentBody
                      });
                    }
                  } else {
                    console.log(`Issue #${issue.number}: Could not find assign event for @${username}. Skipping.`);
                  }
                }
              } catch (err) {
                console.error(`Error processing issue #${issue.number}:`, err.message);
              }
            }
