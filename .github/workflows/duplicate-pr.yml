name: Duplicate PR Detection

on:
  pull_request_target:
    types: [opened]

concurrency:
  group: duplicate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  detect-duplicate-pr:
    if: ${{ !endsWith(github.event.pull_request.user.login, '[bot]') }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const num = pr.number;
            const body = pr.body || '';

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: num, per_page: 50 });
            if (comments.some(c => c.user.login === 'github-actions[bot]' && c.body.includes('Possible Duplicate PR'))) {
              console.log('Already flagged — skipping');
              return;
            }

            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*:?\s*#(\d+)/gi;
            const linked = [...new Set([...body.matchAll(pattern)].map(m => parseInt(m[1])))];

            if (linked.length === 0) {
              console.log('PR #' + num + ' has no linked issues — skipping');
              return;
            }

            const { data: allPrs } = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 100
            });

            const duplicates = [];

            for (const other of allPrs) {
              if (other.number === num) continue;
              const otherBody = (other.body || '').toLowerCase();
              for (const issueNum of linked) {
                const refPattern = new RegExp(
                  '(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\\s*:?\\s*#' + issueNum + '\\b', 'i'
                );
                if (refPattern.test(otherBody)) {
                  duplicates.push({ pr: other.number, issue: issueNum, title: other.title });
                  break;
                }
              }
            }

            if (duplicates.length === 0) {
              console.log('No duplicate PRs found for #' + num);
              return;
            }

            const list = duplicates
              .map(d => '- PR #' + d.pr + ': **' + d.title + '** (also targets issue #' + d.issue + ')')
              .join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number: num,
              body: '## ⚠️ Possible Duplicate PR\n\nHey @' + pr.user.login +
                '! Another open PR already targets the same linked issue(s):\n\n' + list +
                '\n\nPlease check the original PR before proceeding.',
            });
