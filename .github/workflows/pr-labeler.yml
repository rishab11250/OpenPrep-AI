name: Pull Request Labeler

concurrency:
  group: pr-labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: false

on:
  pull_request_target:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

      - name: Inherit Program and Level Labels from Linked Issues
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const body = context.payload.pull_request.body || '';

            // Find issue references (e.g. closes #123, fixes #123, resolve #123, etc.)
            const issueMatches = [...body.matchAll(/(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#(\d+)/gi)];
            const issueNumbers = issueMatches.map(match => parseInt(match[1], 10));

            const prLabels = [];

            if (issueNumbers.length > 0) {
              console.log(`Found linked issues in PR body: ${issueNumbers.join(', ')}`);
              for (const issueNum of issueNumbers) {
                try {
                  const { data: issue } = await github.rest.issues.get({
                    owner,
                    repo,
                    issue_number: issueNum
                  });
                  
                  const targetLabels = ['esoc', 'esoc-l1', 'esoc-l2', 'esoc-l3', 'esoc-approved', 'good first issue', 'beginner friendly'];
                  for (const label of issue.labels) {
                    const labelName = typeof label === 'string' ? label : label.name;
                    if (targetLabels.includes(labelName)) {
                      prLabels.push(labelName);
                    }
                  }
                } catch (e) {
                  console.log(`Failed to fetch issue #${issueNum}:`, e.message);
                }
              }
            } else {
              console.log('No linked issues found in PR body.');
            }

            // Auto-fallback: if PR only changes documentation, mark as esoc-l1 and esoc
            if (prLabels.length === 0) {
              try {
                const { data: files } = await github.rest.pulls.listFiles({
                  owner,
                  repo,
                  pull_number: prNumber,
                  per_page: 100
                });
                
                const docsOnly = files.every(f => 
                  f.filename.startsWith('docs/') || 
                  f.filename.endsWith('.md') || 
                  f.filename.startsWith('.github/')
                );
                
                if (docsOnly && files.length > 0) {
                  console.log('PR contains only documentation files. Auto-applying esoc-l1.');
                  prLabels.push('esoc', 'esoc-l1');
                }
              } catch (e) {
                console.log('Failed to check PR changed files:', e.message);
              }
            }

            if (prLabels.length > 0) {
              const uniqueLabels = [...new Set(prLabels)];
              console.log(`Applying labels to PR: ${uniqueLabels.join(', ')}`);
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: uniqueLabels
              });
            }

      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          EXISTING=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json labels --jq '.labels[].name')
          if ! echo "$EXISTING" | grep -qx "ready-for-review"; then
            gh pr edit "$PR_NUMBER" --repo "$REPOSITORY" --add-label "ready-for-review"
          fi
