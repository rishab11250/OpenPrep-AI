name: Pull Request Labeler

concurrency:
  group: pr-labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: false

on:
  pull_request_target:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          EXISTING=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json labels --jq '.labels[].name')
          if ! echo "$EXISTING" | grep -qx "ready-for-review"; then
            gh pr edit "$PR_NUMBER" --repo "$REPOSITORY" --add-label "ready-for-review"
          fi
