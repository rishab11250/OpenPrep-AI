name: Issue Auto Labeler

concurrency:
  group: issue-labeler-${{ github.event.issue.number }}
  cancel-in-progress: false

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const title = context.payload.issue.title || '';
            const num = context.issue.number;
            const labels = ['ECSoC26'];

            const upper = title.toUpperCase();
            if (upper.includes('[BUG]')) labels.push('bug');
            else if (upper.includes('[FEATURE]')) labels.push('enhancement');
            else if (upper.includes('[DOCS]') || upper.includes('[DOCUMENTATION]')) labels.push('documentation');
            else if (upper.includes('[QUESTION]')) labels.push('question');

            const areaMap = {
              'Frontend': 'frontend',
              'Backend': 'backend',
              'Database': 'database',
              'Authentication': 'authentication',
              'AI': 'ai',
              'UI/UX': 'ui/ux',
              'PYQ Analysis': 'pyq-analysis',
              'Study Planner': 'study-planner',
              'Dashboard': 'dashboard',
              'Elite Summer of Code (esoc)': 'ECSoC26',
              'Level 1 (Easy / Beginner-friendly) (esoc-l1)': 'ECSoC26-L1',
              'Level 2 (Medium / Intermediate) (esoc-l2)': 'ECSoC26-L2',
              'Level 3 (Hard / Advanced) (esoc-l3)': 'ECSoC26-L3'
            };

            for (const [area, label] of Object.entries(areaMap)) {
              const re = new RegExp(
                '-\\s*\\[x\\]\\s*' + area.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'),
                'im'
              );
              if (re.test(body)) labels.push(label);
            }

            const deduped = [...new Set(labels)];
            if (deduped.length === 0) return;

            const { data: existing } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num
            });
            const have = new Set(existing.map(l => l.name));
            const needed = deduped.filter(l => !have.has(l));
            if (needed.length === 0) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
              labels: needed
            });
