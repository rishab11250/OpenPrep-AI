# Configuration for GitHub Labeler Action matching all required Area paths

frontend:
  - changed-files:
      - any-glob-to-any-file: 'frontend/**/*'

backend:
  - changed-files:
      - any-glob-to-any-file: 'backend/**/*'

database:
  - changed-files:
      - any-glob-to-any-file: 'backend/models/**/*'

authentication:
  - changed-files:
      - any-glob-to-any-file:
          - 'backend/controllers/authController.js'
          - 'backend/middleware/auth.js'
          - 'backend/routes/authRoutes.js'

ai:
  - changed-files:
      - any-glob-to-any-file:
          - 'backend/services/geminiService.js'

ui/ux:
  - changed-files:
      - any-glob-to-any-file:
          - 'frontend/src/components/**/*'

pyq-analysis:
  - changed-files:
      - any-glob-to-any-file:
          - 'backend/controllers/pyqController.js'
          - 'backend/routes/pyqRoutes.js'
          - 'backend/models/PYQ.js'

study-planner:
  - changed-files:
      - any-glob-to-any-file:
          - 'backend/controllers/studyPlanController.js'
          - 'backend/routes/studyPlanRoutes.js'
          - 'backend/models/StudyPlan.js'

# dashboard: No auto-labeling yet — no dashboard-specific files exist in the current codebase.
# The label can still be applied via issue template checkboxes (see issue-labeler.yml).
