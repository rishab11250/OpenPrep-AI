# Configuration for GitHub Labeler Action matching all required Area paths

frontend:
  - changed-files:
      - any-glob-to-any-file: 'frontend/**/*'

backend:
  - changed-files:
      - any-glob-to-any-file: 'backend/**/*'

database:
  - changed-files:
      - any-glob-to-any-file: 'backend/models/**/*'

authentication:
  - changed-files:
      - any-glob-to-any-file:
          - 'backend/controllers/auth/**/*'
          - 'backend/middleware/auth/**/*'

ai:
  - changed-files:
      - any-glob-to-any-file:
          - 'backend/services/ai/**/*'
          - 'backend/services/gemini/**/*'

ui/ux:
  - changed-files:
      - any-glob-to-any-file:
          - 'frontend/src/components/**/*'
          - 'frontend/src/pages/**/*'

pyq-analysis:
  - changed-files:
      - any-glob-to-any-file:
          - 'backend/modules/pyq/**/*'
          - 'frontend/src/features/pyq/**/*'

study-planner:
  - changed-files:
      - any-glob-to-any-file:
          - 'backend/modules/study-planner/**/*'
          - 'frontend/src/features/study-planner/**/*'

dashboard:
  - changed-files:
      - any-glob-to-any-file:
          - 'frontend/src/pages/Dashboard/**/*'
          - 'frontend/src/features/dashboard/**/*'
