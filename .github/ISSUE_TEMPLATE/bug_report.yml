name: 🐛 Bug Report
description: File a bug report to help us improve OpenPrep AI
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below.
  - type: checkboxes
    id: areas
    attributes:
      label: Affected Areas
      description: Select one or more areas that this bug affects.
      options:
        - label: Frontend
        - label: Backend
        - label: Database
        - label: AI
        - label: Authentication
        - label: PYQ Analysis
        - label: Study Planner
        - label: Dashboard
        - label: UI/UX
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what went wrong...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Explain how we can reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened...
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshots / Screen Recordings
      description: If applicable, add screenshots or videos to help explain your problem.
      placeholder: Paste images directly, or link them here...
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Environment & Context
      description: OS version, Node version, Browser name/version, etc.
      placeholder: |
        - OS: Windows 11 / macOS / Ubuntu
        - Node Version: v18.x
        - Browser: Chrome / Edge / Safari
    validations:
      required: false
  - type: checkboxes
    id: checklists
    attributes:
      label: Code of Conduct & Contribution Checklist
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
        - label: I have searched existing issues to ensure this bug has not been reported already.
          required: true
