version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: openprep_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - openprep_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openprep_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI="mongodb+srv://Nishit:@nISHIT12345@cluster0.rzzsvlr.mongodb.net/"
      - JWT_SECRET=supersecret_openprep_key
      - GEMINI_API_KEY=your_gemini_api_key_here
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - openprep_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5000/api}
    container_name: openprep_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - openprep_net

volumes:
  mongo_data:

networks:
  openprep_net:
    driver: bridge
